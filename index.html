<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rdrsxm</title>
</head>
<body>
    <link rel="icon" type="image/svg+xml" href="cat-svgrepo-com.svg">
    <div class="bg-grid"></div>

    <div class="main">
        <header class="site-header">
            <span class="site-title">rdrsxm</span><span class="cursor">_</span>
        </header>

        <div class="button-group">
            <div class="button" onclick="navigateTo(this, 'passwordgenerator/index.html')">
                <span class="btn-index">01</span>
                <span class="btn-label">password generator</span>
                <span class="btn-arrow">→</span>
            </div>
            <div class="button" onclick="navigateTo(this, 'sfondometro/index.html')">
                <span class="btn-index">02</span>
                <span class="btn-label">sfondometro</span>
                <span class="btn-arrow">→</span>
            </div>
        </div>
    </div>
</body>

<style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap');

    *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        background-color: #1a1a1a;
        font-family: "JetBrains Mono", monospace;
        overflow: hidden;
        user-select: none;
    }

    .bg-grid {
        position: fixed;
        inset: 0;
        background-image: radial-gradient(circle, rgba(230,235,224,0.08) 1px, transparent 1px);
        background-size: 28px 28px;
        pointer-events: none;
        z-index: 0;
    }

    .main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 36px;
        position: relative;
        z-index: 1;
    }

    .site-header {
        display: flex;
        align-items: baseline;
        gap: 8px;
        color: #E6EBE0;
        font-size: 0.75rem;
        font-weight: 300;
        letter-spacing: 0.12em;
        opacity: 0.5;
        user-select: none;
        animation: fadeUp 0.6s ease both;
    }

    .cursor {
        animation: blink 1.1s step-end infinite;
        color: #a8d5b5;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
    }

    .clock {
        margin-left: 6px;
        font-size: 0.7rem;
        opacity: 0.6;
    }

    .button-group {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 10px;
        animation: fadeUp 0.6s 0.15s ease both;
    }

    .button-group::before {
        content: '';
        position: absolute;
        inset: -20px -30px;
        background: radial-gradient(ellipse at center, rgba(168,213,181,0.07) 0%, transparent 70%);
        pointer-events: none;
        border-radius: 4px;
    }

    .button {
        background-color: #e8e0d5;
        display: flex;
        align-items: center;
        gap: 14px;
        width: 280px;
        padding: 16px 20px;
        color: #1e2128;
        font-family: "JetBrains Mono", monospace;
        font-weight: 500;
        font-size: 0.85rem;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: background-color 400ms ease, padding-left 400ms ease, letter-spacing 400ms ease, transform 600ms cubic-bezier(0.4, 0, 0.2, 1), opacity 600ms ease;
    }

    .button:hover {
        padding-left: 26px;
        letter-spacing: 0.03em;
    }

    .button.clicked {

    }

    .btn-index {
        font-size: 0.65rem;
        font-weight: 300;
        opacity: 0.35;
        flex-shrink: 0;
        transition: opacity 300ms;
    }

    .button:hover .btn-index {
        opacity: 0.6;
    }

    .btn-label {
        flex: 1;
    }

    .btn-arrow {
        font-size: 0.8rem;
        opacity: 0.5;
        transition: opacity 300ms ease, transform 300ms ease;
    }

    .btn-arrow.clicked {
        opacity: 0;
        transform: translateX(50px);
    }



    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
    }
</style>

<script>
    function navigateTo(el, url) {
        if (el.classList.contains('clicked')) return;
        el.classList.add('clicked');
        el.querySelector('.btn-index').classList.add('clicked');
        el.querySelector('.btn-label').classList.add('clicked');
        el.querySelector('.btn-arrow').classList.add('clicked');
        setTimeout(function() {
            window.location.href = url;
        }, 500);
    }
</script>
</html>
